# ============================================================
#  YOUR JOB SEARCH PREFERENCES
#  Edit this file to tell the AI what kind of jobs to find
# ============================================================

candidate:
  name: "Mehtaab Kohli"
  email: "mehtaabkohli@gmail.com"
  phone: "+91 81948 21177"
  linkedin: ""
  portfolio: ""

job_search:
  # List of job titles to search for (the AI will search for all of these)
  titles:
    - "ML Engineer Intern"
    - "Machine Learning Intern"
    - "Product Manager Intern"
    - "AI/ML Intern"

  # Location preferences
  location: "Remote"
  remote_ok: true
  hybrid_ok: true
  onsite_ok: false

  # Experience level
  experience_level:
    - "entry-level"
    - "internship"

  # Salary expectations (leave as 0 to not filter by salary)
  salary_min: 0
  salary_max: 0

  # Employment type
  employment_type:
    - "internship"

  # How recent should job postings be? (in days)
  max_posting_age_days: 14

resume_tailoring:
  # Skills to ALWAYS emphasize regardless of job
  core_skills:
    - "Python"
    - "Machine Learning"
    - "Deep Learning"
    - "Data Analytics"
    - "NLP"

  # Skills to mention only if relevant to the job
  secondary_skills:
    - "RoBERTa/BERT"
    - "Hugging Face"
    - "LLMs"
    - "Power BI"
    - "Git/GitHub"
    - "Google Colab"
    - "Jupyter"

  # How aggressively to tailor the resume
  tailoring_level: "moderate"

cover_letter:
  tone: "professional"
  max_words: 350
  include_why_company: true
  include_key_achievement: true

blacklist:
  # Companies to NEVER apply to
  companies: []

  # Keywords in job titles to skip
  title_keywords_to_avoid:
    - "unpaid"

  # Keywords in job descriptions that are red flags
  description_red_flags:
    - "must work weekends"
    - "no work-life balance"
    - "rockstar"
